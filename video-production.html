<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Video Production Matrix - Bookmark Loader</title>
    <link rel="stylesheet" href="css/main.css">
    <link rel="stylesheet" href="css/responsive.css">
    <style>
        body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; background: #0f172a; color: #f8fafc; margin: 20px; }
        h1 { color: #38bdf8; border-bottom: 2px solid #38bdf8; padding-bottom: 10px; }
        .matrix-grid { display: grid; grid-template-columns: repeat(auto-fit, minmax(300px, 1fr)); gap: 20px; margin-top: 20px; }
        .category { background: #1e293b; border-radius: 8px; padding: 15px; border: 1px solid #334155; }
        .category h2 { font-size: 1.2rem; margin-top: 0; color: #fbbf24; border-bottom: 1px solid #334155; padding-bottom: 5px; }
        .link-item { margin: 8px 0; display: flex; align-items: center; justify-content: space-between; }
        a { color: #94a3b8; text-decoration: none; font-size: 0.9rem; transition: color 0.2s; }
        a:hover { color: #38bdf8; }
        .emoji { margin-right: 10px; }
        .dual-link { display: flex; gap: 10px; }
        .badge { font-size: 0.7rem; padding: 2px 6px; border-radius: 4px; background: #334155; color: #cbd5e1; }
        .badge-live { background: #059669; color: white; }
    </style>
</head>
<body>
    <!-- Debug Menu -->
    <nav id="debug-menu" class="debug-menu" style="display: none;">
        <div class="debug-menu-container">
            <span class="debug-label">DEBUG:</span>
            <div id="debug-menu-items"></div>
        </div>
    </nav>

    <!-- Main Navigation -->
    <nav class="main-nav">
        <div class="nav-container">
            <div class="nav-brand">
                <h1>🎬 Video Production</h1>
            </div>

            <div class="nav-search">
                <input
                    type="text"
                    id="search-input"
                    placeholder="Search... (Ctrl+K)"
                    autocomplete="off"
                />
                <div id="search-autocomplete" class="autocomplete-dropdown"></div>
            </div>

            <div class="nav-links" id="nav-links"></div>

            <button id="debug-toggle" class="debug-toggle" title="Toggle Debug Menu">
                🐛
            </button>
        </div>
    </nav>

    <div style="padding: 20px;">
    <h1>🎬 Video Production Maturity Matrix</h1>

    <div class="matrix-grid" id="matrix-grid">
        <!-- Content will be dynamically loaded from JSON -->
    </div>
    </div>

    <script>
        // Load and render video production links from JSON
        async function loadVideoProductionLinks() {
            try {
                const response = await fetch('data/video-production-links.json');
                const data = await response.json();
                renderMatrix(data.categories);
            } catch (error) {
                console.error('Failed to load video production links:', error);
                document.getElementById('matrix-grid').innerHTML = '<p style="color: #ef4444;">Failed to load project data</p>';
            }
        }

        function renderMatrix(categories) {
            const grid = document.getElementById('matrix-grid');

            grid.innerHTML = categories.map(category => `
                <div class="category">
                    <h2>${category.icon} ${category.name}</h2>
                    ${category.projects.map(project => `
                        <div class="link-item">
                            <span>
                                <span class="emoji">${project.emoji}</span>
                                <a href="${project.github || project.external}">${project.name}</a>
                            </span>
                            ${project.live ? `
                                <div class="dual-link">
                                    <a href="${project.live}" class="badge badge-live" target="_blank">LIVE</a>
                                </div>
                            ` : ''}
                        </div>
                    `).join('')}
                </div>
            `).join('');
        }

        // Load on page ready
        loadVideoProductionLinks();
    </script>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <div class="footer-content">
                <div class="footer-links">
                    <h4>Connect</h4>
                    <div id="social-links"></div>
                </div>
                <div class="footer-info">
                    <p>&copy; 2026 Bookmark Loader - A Project Self-Learning System</p>
                </div>
            </div>
        </div>
    </footer>

    <!-- Scripts -->
    <script src="js/menu.js"></script>
    <script src="js/search.js"></script>
    <script src="js/debug.js"></script>
</body>
</html>
